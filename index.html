<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mobile Care & Accessories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        /* Home View Styles */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .service-card {
            background: white;
            padding: 25px 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-3px);
            border-color: #007bff;
            box-shadow: 0 6px 15px rgba(0,123,255,0.15);
        }

        .service-card .icon {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
        }

        /* Detail View Styles */
        .view-panel {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .back-btn {
            background: #eef2f7;
            color: #333;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            background: #dcdcdc;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 20px;
            color: #0056b3;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            background-color: #fff;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }

        .btn-search {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-search:hover {
            background-color: #0056b3;
        }

        /* Result Styles */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            display: none;
            font-weight: bold;
        }

        .available {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .not-available {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn-action {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .btn-whatsapp-order {
            background-color: #25D366;
        }
        .btn-whatsapp-order:hover { background-color: #128C7E; }

        .btn-whatsapp-notify {
            background-color: #ffc107;
            color: #333;
        }
        .btn-whatsapp-notify:hover { background-color: #e0a800; }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Smart Mobile Care</h1>
        <p>Premium Covers, Glass, Repairs & Software Solutions</p>
    </header>

    <div class="container">
        
        <!-- HOME VIEW (MAIN MENU) -->
        <div id="homeView">
            <h2 style="text-align: center; margin-bottom: 15px;">Select a Service</h2>
            <div class="services-grid">
                <div class="service-card" onclick="openService('Covers', '📱 Mobile Covers', 'Check Stock for Premium Covers')">
                    <span class="icon">📱</span> Mobile Covers
                </div>
                <div class="service-card" onclick="openService('Glass', '💎 Tempered Glass', 'Check Stock for OG Tempered Glass')">
                    <span class="icon">💎</span> Tempered Glass
                </div>
                <div class="service-card" onclick="openService('Repair', '🛠️ Display & Repair', 'Check Spare Parts & Repair Cost')">
                    <span class="icon">🛠️</span> Display & Repair
                </div>
                <div class="service-card" onclick="openService('Software', '🔓 Software & Unlocking', 'Check Feasibility for Unlocking/Flashing')">
                    <span class="icon">🔓</span> Software & Unlocking
                </div>
            </div>
        </div>

        <!-- DYNAMIC SERVICE VIEW (PAGES) -->
        <div id="serviceView" class="view-panel">
            <button class="back-btn" onclick="goBack()">← Back to Home</button>
            <h2 id="serviceTitle">Service Name</h2>
            <p id="serviceDesc" style="font-size: 14px; color:#666; margin-bottom: 20px;"></p>
            
            <form id="serviceForm">
                <!-- Brand Dropdown -->
                <div class="form-group">
                    <label for="deviceBrand">Select Mobile Brand:</label>
                    <select id="deviceBrand" required>
                        <option value="">-- Select Brand --</option>
                        <option value="Realme">Realme</option>
                        <option value="Vivo">Vivo</option>
                        <option value="Oppo">Oppo</option>
                        <option value="Xiaomi / Mi">Xiaomi / Mi</option>
                        <option value="Redmi">Redmi</option>
                        <option value="POCO">POCO</option>
                        <option value="Samsung">Samsung</option>
                        <option value="Apple (iPhone)">Apple (iPhone)</option>
                        <option value="OnePlus">OnePlus</option>
                        <option value="Infinix">Infinix</option>
                        <option value="Tecno">Tecno</option>
                        <option value="Motorola">Motorola</option>
                        <option value="IQOO">IQOO</option>
                        <option value="Nothing">Nothing</option>
                        <option value="Google Pixel">Google Pixel</option>
                        <option value="Lava">Lava</option>
                        <option value="Nokia">Nokia</option>
                        <option value="Asus">Asus</option>
                        <option value="Sony">Sony</option>
                        <option value="LG">LG</option>
                        <option value="Honor">Honor</option>
                        <option value="Huawei">Huawei</option>
                        <option value="Micromax">Micromax</option>
                        <option value="Itel">Itel</option>
                        <option value="HTC">HTC</option>
                    </select>
                </div>

                <!-- Model Input -->
                <div class="form-group">
                    <label for="deviceModel">Type Mobile Model:</label>
                    <input type="text" id="deviceModel" placeholder="e.g., 11 Pro, V29, Note 30" required>
                </div>

                <!-- Extra Option for Repair and Software -->
                <div class="form-group" id="extraServiceGroup" style="display: none;">
                    <label id="extraLabel" for="extraOption">Select Issue:</label>
                    <select id="extraOption">
                        <!-- Options filled dynamically -->
                    </select>
                </div>

                <button type="button" class="btn-search" onclick="checkAvailability()">Search / Check Availability 🔍</button>
            </form>

            <!-- Result Display Area -->
            <div id="resultBox" class="result-box"></div>
            <div id="actionButtonArea"></div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 Smart Mobile Care. Developed for Local Businesses.</p>
    </footer>

    <script>
        // REMEMBER TO ENTER THE SHOPKEEPER'S WHATSAPP NUMBER HERE (With 91)
        const shopPhoneNumber = "910000000000"; 

        let currentServiceKey = "";

        function openService(serviceKey, title, description) {
            currentServiceKey = serviceKey;
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('serviceView').style.display = 'block';
            document.getElementById('serviceTitle').innerText = title;
            document.getElementById('serviceDesc').innerText = description;

            document.getElementById('serviceForm').reset();
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('actionButtonArea').innerHTML = '';

            const extraGroup = document.getElementById('extraServiceGroup');
            const extraOption = document.getElementById('extraOption');
            const extraLabel = document.getElementById('extraLabel');

            if (serviceKey === 'Repair') {
                extraGroup.style.display = 'block';
                extraLabel.innerText = "Select Repair Type:";
                extraOption.innerHTML = `
                    <option value="Display/Screen Replacement">Display / Screen Replacement</option>
                    <option value="Battery Replacement">New Battery Installation</option>
                    <option value="Charging Port Repair">Charging Port Issue</option>
                    <option value="Camera / Glass Repair">Camera Glass Damage</option>
                    <option value="Speaker / Mic Fix">Speaker or Mic Issue</option>
                `;
            } else if (serviceKey === 'Software') {
                extraGroup.style.display = 'block';
                extraLabel.innerText = "Select Software Issue:";
                extraOption.innerHTML = `
                    <option value="Pattern / PIN Unlock">Pattern / PIN / Password Lock</option>
                    <option value="FRP Bypass (Google Lock)">FRP Bypass (Google Account Lock)</option>
                    <option value="Phone Hanging / Flashing">Phone Lagging / Full Software Flash</option>
                    <option value="Data Recovery">Lost Data Recovery</option>
                `;
            } else {
                extraGroup.style.display = 'none';
            }
        }

        function goBack() {
            document.getElementById('serviceView').style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
        }

        function checkAvailability() {
            const brand = document.getElementById('deviceBrand').value;
            const model = document.getElementById('deviceModel').value;
            const resultBox = document.getElementById('resultBox');
            const actionArea = document.getElementById('actionButtonArea');

            if (!brand || !model) {
                alert("Please select brand and type your model name!");
                return;
            }

            resultBox.style.display = 'block';
            resultBox.innerHTML = "Checking stock status...";
            resultBox.className = "result-box"; 
            actionArea.innerHTML = '';

            setTimeout(() => {
                const isAvailable = Math.random() > 0.35;
                let extraDetails = "";
                if(document.getElementById('extraServiceGroup').style.display === 'block') {
                    extraDetails = document.getElementById('extraOption').value;
                }

                if (isAvailable) {
                    resultBox.innerHTML = `✅ AVAILABLE! We have this item/service ready for your phone.`;
                    resultBox.classList.add('available');
                    
                    actionArea.innerHTML = `
                        <button class="btn-action btn-whatsapp-order" onclick="sendToWhatsApp('Order', '${brand}', '${model}', '${extraDetails}')">
                            Order / Book Now via WhatsApp 🚀
                        </button>
                    `;
                } else {
                    resultBox.innerHTML = `❌ NOT AVAILABLE CURRENTLY! Out of stock or requires special order.`;
                    resultBox.classList.add('not-available');
                    
                    actionArea.innerHTML = `
                        <button class="btn-action btn-whatsapp-notify" onclick="sendToWhatsApp('Notify', '${brand}', '${model}', '${extraDetails}')">
                            🔔 Notify Me When Available
                        </button>
                    `;
                }
            }, 600);
        }

        function sendToWhatsApp(type, brand, model, extra) {
            let messageText = "";

            if (type === 'Order') {
                messageText = `*New Order from Website*%0A%0A` +
                              `*Service:* ${currentServiceKey} Service%0A` +
                              `*Brand:* ${encodeURIComponent(brand)}%0A` +
                              `*Model:* ${encodeURIComponent(model)}%0A`;
                if(extra) messageText += `*Requirement:* ${encodeURIComponent(extra)}%0A`;
                messageText += `*Status:* Checked Available. Please confirm the order!`;
            } else {
                messageText = `*Stock Notification Request*%0A%0A` +
                              `*Service:* ${currentServiceKey} Service%0A` +
                              `*Brand:* ${encodeURIComponent(brand)}%0A` +
                              `*Model:* ${encodeURIComponent(model)}%0A`;
                if(extra) messageText += `*Requirement:* ${encodeURIComponent(extra)}%0A`;
                messageText += `*Status:* Not Available. Please notify me when this is in stock! 🔔`;
            }

            const whatsappUrl = `https://api.whatsapp.com/send?phone=${shopPhoneNumber}&text=${messageText}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
