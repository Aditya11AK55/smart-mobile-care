<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mobile Care | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111827; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .status-badge { background: #065f46; padding: 5px 15px; border-radius: 20px; font-size: 12px; }
        .card-container { display: grid; gap: 15px; }
        .card { background: #1f2937; padding: 20px; border-radius: 15px; border: 1px solid #374151; }
        .btn-order { background: #4f46e5; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Smart Mobile Care</h1>
        <span class="status-badge"><i class="fa-solid fa-circle-check"></i> SHOP OPEN</span>
    </div>

    <div class="card-container">
        <div class="card">
            <h3><i class="fa-solid fa-mobile-screen"></i> Display Repair</h3>
            <p>Original quality display replacement.</p>
            <button class="btn-order" onclick="sendWhatsApp('Display Repair')">Book Now</button>
        </div>
        <div class="card">
            <h3><i class="fa-solid fa-headphones"></i> Bluetooth Earbuds</h3>
            <p>Premium sound, low price.</p>
            <button class="btn-order" onclick="sendWhatsApp('Bluetooth Earbuds')">Book Now</button>
        </div>
    </div>

    <script>
        function sendWhatsApp(service) {
            const phoneNumber = "91XXXXXXXXXX"; // अपना नंबर यहाँ डालें
            const url = `https://wa.me/${phoneNumber}?text=Hello, I want to book: ${service}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
