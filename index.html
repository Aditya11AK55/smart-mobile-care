<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Shop - Customer Panel</title>
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Section: Shop Name -->
    <header class="main-header">
        <!-- You can replace 'My Mobile Shop' with your actual shop name -->
        <h1 class="shop-name">My Mobile Shop</h1>
    </header>

    <!-- Running Offer Ticker (Marquee) -->
    <div class="offer-ticker">
        <marquee behavior="scroll" direction="left">
            🎉 TODAY'S SPECIAL OFFER: Get up to ₹299 OFF on any new Premium Neckband! Hurry up before the stock runs out! 🔥
        </marquee>
    </div>

</body>
</html>
