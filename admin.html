<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopkeeper Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        /* Login Form Styles */
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-top: 50px; }
        .login-box h2 { margin-bottom: 20px; color: #1f2937; }
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-primary { width: 100%; background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }

        /* Dashboard Styles */
        .dashboard-box { display: none; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 15px; }
        .card-header h3 { margin: 0; font-size: 16px; color: #1f2937; }
        
        /* Status Toggle */
        .status-btn { background: #22c55e; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .status-btn.closed { background: #ef4444; }

        /* Lists */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
        .item-row:last-child { border-bottom: none; }
        .btn-delete { background: #fee2e2; color: #ef4444; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        /* Add Form */
        .add-flex { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-add { background: #22c55e; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 13px; outline: none; }
    </style>
</head>
<body>

    <div class="container login-box" id="loginScreen">
        <h2><i class="fa-solid fa-store"></i> Staff Login</h2>
        <input type="text" id="username" class="input-field" placeholder="Username (shop101)">
        <input type="password" id="password" class="input-field" placeholder="Password (store789)">
        <button class="btn-primary" onclick="checkLogin()">Login to Dashboard</button>
        <p class="error-msg" id="errorMsg">Incorrect Username or Password!</p>
    </div>

    <div class="container dashboard-box" id="dashboardScreen">
        
        <div class="card">
            <div class="card-header">
                <h3>Shop Status</h3>
                <button id="shopStatusBtn" class="status-btn" onclick="toggleShop()">OPEN</button>
            </div>
            <p style="font-size: 12px; color: #6b7280; margin: 0;">Change shop status to let customers know if you are open or closed.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Live Stock Inventory</h3>
            </div>
            <div class="add-flex">
                <input type="text" id="newItemInput" class="input-field" style="margin-bottom: 0;" placeholder="Item Name (e.g., Charger)">
                <button class="btn-add" onclick="addStock()">Add</button>
            </div>
            <div id="stockList">
                <div class="item-row">
                    <span>boAt Earbuds</span>
                    <button class="btn-delete" onclick="this.parentElement.remove()">Remove</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Repair Job Sheet</h3>
            </div>
            <div id="repairList">
                <div class="item-row">
                    <span>Token: SMC-101 (Screen Fix)</span>
                    <select onchange="this.style.color = this.value === 'Ready' ? 'green' : 'orange'">
                        <option value="In Progress" style="color: orange;">In Progress ⏳</option>
                        <option value="Ready" style="color: green;">Device Ready 🎉</option>
                    </select>
                </div>
            </div>
        </div>

    </div>

    <script>
        // LOGIN LOGIC
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMsg');

            if(user === 'shop101' && pass === 'store789') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'block';
                error.style.display = 'none';
            } else {
                error.style.display = 'block';
            }
        }

        // SHOP STATUS TOGGLE
        function toggleShop() {
            const btn = document.getElementById('shopStatusBtn');
            if(btn.innerText === 'OPEN') {
                btn.innerText = 'CLOSED';
                btn.classList.add('closed');
            } else {
                btn.innerText = 'OPEN';
                btn.classList.remove('closed');
            }
        }

        // ADD INVENTORY
        function addStock() {
            const input = document.getElementById('newItemInput');
            const list = document.getElementById('stockList');
            if(input.value.trim() !== '') {
                const newRow = document.createElement('div');
                newRow.className = 'item-row';
                newRow.innerHTML = `<span>${input.value}</span> <button class="btn-delete" onclick="this.parentElement.remove()">Remove</button>`;
                list.appendChild(newRow);
                input.value = ''; // clear input
            }
        }
    </script>
</body>
</html>
